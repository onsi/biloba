name: test

on: [push, pull_request]

jobs:
  mod:
    runs-on: ubuntu-latest
    name: Check modules
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
    - run: go mod tidy && git diff --exit-code go.mod go.sum

  build:
    runs-on: ubuntu-latest
    name: Test (default chrome-headless-shell)
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
    - run: go vet ./...
    # Ubuntu 23.10+ (the ubuntu-latest runner) restricts unprivileged user namespaces via
    # AppArmor, which Chrome's sandbox needs to start. Relax it so Chrome can launch with the
    # sandbox intact (rather than weakening Biloba's defaults with --no-sandbox).
    # https://chromium.googlesource.com/chromium/src/+/main/docs/security/apparmor-userns-restrictions.md
    - run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
    # default (pragmatic) mode: the suite auto-installs chrome-headless-shell via Chrome for Testing.
    # --poll-progress-after dumps the running spec's goroutine stack if a spec ever wedges, and
    # --timeout bounds the suite so a hang fails fast instead of burning the 1h default.
    - run: go run github.com/onsi/ginkgo/v2/ginkgo -r --randomize-all --fail-on-pending --keep-going --race -procs=2 --poll-progress-after=30s --timeout=8m

  high-fidelity:
    runs-on: ubuntu-latest
    name: Test (high-fidelity headless)
    env:
      # drive the suite through the full ("new") headless Chrome path (uses the runner's
      # pre-installed google-chrome) so both fidelity modes stay green
      BILOBA_TEST_HIGH_FIDELITY: "true"
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
    # Ubuntu 23.10+ (the ubuntu-latest runner) restricts unprivileged user namespaces via
    # AppArmor, which Chrome's sandbox needs to start. Relax it so Chrome can launch with the
    # sandbox intact (rather than weakening Biloba's defaults with --no-sandbox).
    # https://chromium.googlesource.com/chromium/src/+/main/docs/security/apparmor-userns-restrictions.md
    - run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
    # Runs in parallel like the default lane; the suite staggers each process's ConnectToChrome on
    # CI+high-fidelity so the concurrent remote-allocator attaches don't wedge full google-chrome.
    - run: go run github.com/onsi/ginkgo/v2/ginkgo -r --randomize-all --fail-on-pending --keep-going --race -procs=2 --poll-progress-after=30s --timeout=8m
