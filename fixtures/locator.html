<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Locator Fixture</title>
</head>
<body>
  <h1 id="heading">Locators</h1>
  <h2>Getting Started</h2>

  <button onclick="document.getElementById('clicked').textContent = 'Save'">Save</button>
  <button>Cancel</button>
  <button aria-label="Close dialog">X</button>
  <a href="/docs">Documentation</a>
  <span id="clicked">no</span>

  <p>Welcome back, Jane</p>

  <label for="email">Email</label>
  <input id="email" type="text" />

  <label>Password <input id="pw" type="password" /></label>

  <input id="search" type="search" aria-label="Site search" />

  <input id="agree" type="checkbox" />
  <label for="agree">I agree</label>

  <!-- Within scoping: two "Delete" buttons in distinct containers -->
  <div id="dialog-a">
    <button>Delete</button>
  </div>
  <div id="dialog-b">
    <button>Delete</button>
  </div>

  <!-- Ordinal selection: a list of same-role items -->
  <ul id="fruits">
    <li>Apple</li>
    <li>Banana</li>
    <li>Cherry</li>
    <li>Date</li>
  </ul>

  <!-- Accessible name from placeholder -->
  <input id="phone" type="tel" placeholder="Phone number" />

  <!-- alt text, title, test id -->
  <img id="logo" src="logo.png" alt="Company logo" />
  <span id="help" title="Tooltip help">?</span>
  <button data-testid="submit-btn">Go</button>

  <!-- And / Or: classed buttons -->
  <button class="primary">Primary Action</button>
  <button class="secondary">Secondary Action</button>

  <!-- Containing / ContainingText: product rows, some with a remove button -->
  <ul id="products">
    <li>Product 1 <button class="del">Remove</button></li>
    <li>Product 2</li>
    <li>Product 3 <button class="del">Remove</button></li>
  </ul>

  <!-- heading level -->
  <h3>Subsection</h3>

  <!-- ARIA states -->
  <input id="checked-box" type="checkbox" checked />
  <button id="disabled-btn" disabled>Disabled</button>
  <button id="menu-btn" aria-expanded="true">Menu</button>
  <button id="toggle-btn" aria-pressed="true">Bold</button>
  <ul role="listbox">
    <li id="opt-1" role="option">Option 1</li>
    <li id="opt-2" role="option" aria-selected="true">Option 2</li>
  </ul>

  <!-- Follows-in-flow, not nested: "Continue" appears BOTH nested inside #quiz and as a sibling AFTER
       it.  ByText("Continue").NotWithin("#quiz") keeps only the sibling, which follows #quiz in flow. -->
  <section id="quiz">
    Question <span>Continue</span>
  </section>
  <button id="after-quiz">Continue</button>

  <!-- Open shadow root containing a button with an accessible name -->
  <shadow-card id="card"></shadow-card>
  <script>
    customElements.define("shadow-card", class extends HTMLElement {
      connectedCallback() {
        let root = this.attachShadow({ mode: "open" })
        root.innerHTML = '<button aria-label="Shadow Action">go</button>'
      }
    })
  </script>
</body>
</html>
