<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Keyboard Testpage</title>

    <style>
        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div id="hello">Hello Keyboard!</div>

    <!-- records the sequence of key events so we can distinguish real keystrokes from SetValue -->
    <input id="typewriter" type="text" />
    <ul id="key-log"></ul>

    <input id="disabled-input" type="text" disabled />
    <input id="hidden-input" type="text" class="hidden" />

    <form id="search-form" action="javascript:void(0)">
        <input id="search-input" type="text" />
    </form>
    <div id="submitted">not submitted</div>

    <!-- records the modifier flags + key of the most recent keydown, so we can assert hotkey combos -->
    <textarea id="editor"></textarea>
    <div id="last-combo">none</div>

    <!-- records keydowns seen at the document level, so we can assert focus-free / global-hotkey sends -->
    <div id="global-hotkey">none</div>

    <script>
        const log = document.getElementById("key-log")
        const typewriter = document.getElementById("typewriter")
        typewriter.addEventListener("keydown", (e) => {
            const li = document.createElement("li")
            li.className = "key-event"
            li.innerText = e.key
            log.appendChild(li)
        })

        const editor = document.getElementById("editor")
        const lastCombo = document.getElementById("last-combo")
        editor.addEventListener("keydown", (e) => {
            const mods = []
            if (e.shiftKey) mods.push("Shift")
            if (e.ctrlKey) mods.push("Ctrl")
            if (e.altKey) mods.push("Alt")
            if (e.metaKey) mods.push("Meta")
            lastCombo.innerText = [...mods, e.key].join("+")
        })

        const globalHotkey = document.getElementById("global-hotkey")
        document.addEventListener("keydown", (e) => {
            globalHotkey.innerText = e.key
        })

        const form = document.getElementById("search-form")
        form.addEventListener("submit", (e) => {
            e.preventDefault()
            document.getElementById("submitted").innerText = "submitted: " + document.getElementById("search-input").value
        })
    </script>
</body>

</html>
