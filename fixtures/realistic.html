<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Realistic Fixture</title>
  <style>
    #menu { position: relative; width: 160px; padding: 8px; background: #eee; }
    #submenu { display: none; }
    #menu:hover #submenu { display: block; }
  </style>
</head>
<body>
  <h1 id="heading">Realistic</h1>

  <button id="plain-btn">Plain</button>
  <span id="plain-result">no</span>

  <!-- middle-click and modifier-click targets, positioned near the top so they're in view -->
  <button id="aux-btn">Middle me</button>
  <span id="aux-result">no</span>
  <button id="mod-btn">Modify me</button>
  <span id="mod-result">no</span>
  <button id="tap-btn">Tap me</button>
  <span id="tap-result">no</span>

  <!-- a sized pad that records the click offset relative to its own top-left, near the top so it's in view -->
  <div id="click-pad" style="width: 200px; height: 200px; background: #cde"></div>
  <span id="click-pad-result">none</span>

  <!-- only registers a click if a mouseover preceded it (gates on real pointer arrival) -->
  <button id="gated-btn">Gated</button>
  <span id="gated-result">no</span>

  <button id="disabled-btn" disabled>Disabled</button>

  <!-- form controls for realistic SetValue -->
  <input id="text-input" type="text" value="old" />
  <span id="text-changed">no</span>
  <input id="check-input" type="checkbox" />
  <span id="check-changed">no</span>

  <!-- a button fully covered by an overlay in its own stacking context -->
  <div style="position: relative; display: inline-block">
    <button id="covered-btn">Covered</button>
    <div id="cover" style="position: absolute; inset: 0; background: rgba(0,0,0,0.2)"></div>
  </div>
  <span id="covered-result">no</span>

  <!-- submenu revealed purely by CSS :hover -->
  <div id="menu">Menu
    <div id="submenu"><button id="submenu-item">Choose</button></div>
  </div>
  <p id="hover-result">no</p>

  <!-- several buttons for ClickEach -->
  <button class="each-btn">E1</button>
  <button class="each-btn">E2</button>
  <button class="each-btn">E3</button>

  <!-- a button that transitions into place on load (for the stability wait) -->
  <button id="moving-btn" style="position: relative; left: 0; transition: left 120ms">Moving</button>
  <span id="moving-result">no</span>

  <!-- a button (and input) far below the fold -->
  <div style="height: 3000px">spacer</div>
  <button id="below-btn">Below the fold</button>
  <p id="scroll-result">no</p>
  <input id="below-input" type="text" />

  <!-- an element taller than the viewport (its geometric center is off-screen) -->
  <div id="big" style="height: 150vh; background: #f0f0f0">Big region</div>
  <span id="big-result">no</span>

  <!-- double-click and right-click targets -->
  <button id="dbl-btn">Double me</button>
  <span id="dbl-clicks">0</span>
  <span id="dbl-result">no</span>
  <button id="ctx-btn">Right me</button>
  <span id="ctx-result">no</span>

  <!-- pointer-based drag-and-drop targets -->
  <div id="drag-src" style="display: inline-block; padding: 8px; background: #cde">Drag me</div>
  <div id="drop-zone" style="display: inline-block; padding: 8px; background: #dec">Drop here</div>
  <span id="drop-result">no</span>

  <!-- scrollable wheel target -->
  <div id="scroll-box" style="height: 100px; overflow: auto; background: #eef"><div style="height: 1000px">tall</div></div>
  <span id="wheel-result">no</span>

  <script>
    const set = (id, v) => (document.getElementById(id).textContent = v);
    document.getElementById('plain-btn').addEventListener('click', () => set('plain-result', 'clicked'));
    let gatedHovered = false;
    const gated = document.getElementById('gated-btn');
    gated.addEventListener('mouseover', () => (gatedHovered = true));
    gated.addEventListener('click', () => { if (gatedHovered) set('gated-result', 'clicked'); });
    document.getElementById('text-input').addEventListener('change', () => set('text-changed', 'yes'));
    document.getElementById('check-input').addEventListener('change', () => set('check-changed', 'yes'));
    document.querySelectorAll('.each-btn').forEach((btn) => btn.addEventListener('click', () => (btn.textContent = 'clicked')));
    requestAnimationFrame(() => (document.getElementById('moving-btn').style.left = '60px'));
    document.getElementById('moving-btn').addEventListener('click', () => set('moving-result', 'clicked'));
    document.getElementById('big').addEventListener('click', () => set('big-result', 'clicked'));
    document.getElementById('covered-btn').addEventListener('click', () => set('covered-result', 'clicked'));
    document.getElementById('submenu-item').addEventListener('click', () => set('hover-result', 'selected'));
    document.getElementById('below-btn').addEventListener('click', () => set('scroll-result', 'clicked'));
    let dblClicks = 0;
    const dblBtn = document.getElementById('dbl-btn');
    dblBtn.addEventListener('click', () => set('dbl-clicks', ++dblClicks));
    dblBtn.addEventListener('dblclick', () => set('dbl-result', 'double'));
    document.getElementById('ctx-btn').addEventListener('contextmenu', (e) => { e.preventDefault(); set('ctx-result', 'menu'); });
    let dragging = false;
    document.getElementById('drag-src').addEventListener('pointerdown', () => (dragging = true));
    document.getElementById('drop-zone').addEventListener('pointerup', () => { if (dragging) set('drop-result', 'dropped'); dragging = false; });
    document.getElementById('scroll-box').addEventListener('wheel', () => set('wheel-result', 'wheeled'));
    document.getElementById('click-pad').addEventListener('click', (e) => { const r = document.getElementById('click-pad').getBoundingClientRect(); set('click-pad-result', Math.round(e.clientX - r.left) + ',' + Math.round(e.clientY - r.top)); });
    document.getElementById('aux-btn').addEventListener('auxclick', (e) => { if (e.button === 1) set('aux-result', 'middle'); });
    document.getElementById('tap-btn').addEventListener('touchend', () => set('tap-result', 'tapped'));
    document.getElementById('mod-btn').addEventListener('click', (e) => {
      let mods = [];
      if (e.shiftKey) mods.push('shift');
      if (e.ctrlKey) mods.push('control');
      if (e.altKey) mods.push('alt');
      if (e.metaKey) mods.push('meta');
      set('mod-result', mods.join('+') || 'none');
    });
  </script>
</body>
</html>
